<h1>Courses</h1>

<h2>Add Course</h2>

<form id="courseForm">

<label>Course ID</label>
<input type="number" id="courseID" required>

<label>Course Name</label>
<input type="text" id="courseName" required>

<label>Department</label>
<select id="deptID">
<option value="1">Computer Science</option>
<option value="2">Electronics and Communication</option>
<option value="3">Electrical</option>
<option value="4">Mechanical</option>
<option value="5">Biomedical and Electronics</option>
<option value="6">Electronics-VLSI Design</option>
</select>

<button type="button" onclick="addCourse()">Add Student</button>

</form>

<h2>Course List</h2>

<table id="courseTable">

<thead>
<tr>
<th>ID</th>
<th>Course Name</th>
<th>DeptID</th>
</tr>
</thead>

<tbody></tbody>

</table>
