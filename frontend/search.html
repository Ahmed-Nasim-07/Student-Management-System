<!DOCTYPE html>
<html>
<head>
<title>Student Search</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="students.html">Students</a>
<a href="courses.html">Courses</a>
<a href="marks.html">Marks</a>
<a href="attendance.html">Attendance</a>
<a href="search.html">Search</a>
</div>

<div class="container">

<h2>Student Search</h2>

<div class="search-grid">

<div>
<label>Student Name</label>
<input type="text" id="name">
</div>

<div>
<label>Student ID</label>
<input type="number" id="studentID">
</div>

<div>
<label>Department Name</label>
<input type="text" id="deptName">
</div>

<div>
<label>Department ID</label>
<input type="number" id="deptID">
</div>

<div>
<label>Minimum Marks</label>
<input type="number" id="marks">
</div>

<div>
<label>Attendance (Minimum %)</label>
<input type="number" id="searchAttendance" placeholder="e.g. 75">
</div>

</div>

<button onclick="searchStudents()">Search Students</button>

<table id="resultTable">
<thead>
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Department</th>
<th>Marks</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script src="search.js"></script>

</body>
</html>
