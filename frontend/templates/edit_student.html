<!DOCTYPE html>
<html>
<head>
<title>Edit Student</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h2>Edit Student</h2>

<form action="/update_student" method="POST">

<input type="hidden" name="studentID" value="{{ student[0] }}">

<label>Name</label>
<input type="text" name="name" value="{{ student[1] }}" required>

<label>Age</label>
<input type="number" name="age" value="{{ student[2] }}">

<label>Phone</label>
<input type="text" name="phone" value="{{ student[3] }}">

<label>Department ID</label>
<input type="number" name="deptID" value="{{ student[4] }}">

<button type="submit">Update</button>

</form>

</body>
</html>
