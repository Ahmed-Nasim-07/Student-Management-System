<!DOCTYPE html>
<html>

<head>
<title>Marks</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
<div class="navbar">
<a href="/">Home</a>
<a href="/students">Students</a>
<a href="/courses">Courses</a>
<a href="/marks">Marks</a>
<a href="/attendance">Attendance</a>
<a href="/search">Search</a>
</div>
<h1>Marks</h1>


<h2>Add Marks</h2>

<form action="/add_marks" method="POST">

<label>Student ID</label>
<input type="number" name="studentID" required>

<label>Course ID</label>
<input type="number" name="courseID" required>

<label>Marks</label>
<input type="number" name="marks" required>

<button type="submit">Add Marks</button>

</form>

<h2>Marks List</h2>

<table id="marksTable">

<thead>
<tr>
<th>ID</th>
<th>StudentID</th>
<th>CourseID</th>
<th>Marks</th>
</tr>
</thead>

<tbody>
{% for mark in marks %}
<tr>
<td>{{ mark[0] }}</td>
<td>{{ mark[1] }}</td>
<td>{{ mark[2] }}</td>
<td>{{ mark[3] }}</td>
<td>
  <a href="/delete_mark/{{ mark[0] }}" onclick="return confirm('Are you sure you want to delete this mark?')">Delete</a>
</td>
</tr>
{% endfor %}
</tbody>

</table>

<script src="js/app.js"></script>

</body>
</html>
